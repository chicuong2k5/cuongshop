{% extends 'base.html' %}
{% load money %}
{% block content %}

<style>
.profile-wrapper{
    background: #1f1b3a;
    border-radius: 15px;
    padding: 40px;
    box-shadow: 0 0 25px #00ffff40;
}

.profile-title{
    color: #ff00ff;
    font-weight: 600;
}

.profile-label{
    font-weight: 500;
}

.profile-avatar{
    width: 150px;
    height: 150px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #00ffff;
    box-shadow: 0 0 15px #00ffff;
}

.btn-neon-save{
    background: linear-gradient(90deg,#ff00ff,#00ffff);
    border: none;
    padding: 10px 40px;
    border-radius: 8px;
    color: white;
    font-weight: 600;
}
</style>

<div class="container mt-4">
    <div class="profile-wrapper">

        <h3 class="profile-title mb-4">
            Hồ Sơ Của Tôi
        </h3>

        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="row align-items-start">

                <!-- LEFT -->
                <div class="col-md-7">

                    <div class="mb-3">
                        <label class="profile-label">Tên đăng nhập</label>
                        {{ u_form.username }}
                    </div>

                    <div class="mb-3">
                        <label class="profile-label">Email</label>
                        {{ u_form.email }}
                    </div>

                    <div class="mb-3">
                        <label class="profile-label">Số điện thoại</label>
                        {{ p_form.phone }}
                    </div>
<!-- GIỚI TÍNH -->
<div class="mb-3">
    <label class="profile-label">Giới tính</label>
    <div class="d-flex gap-3 mt-2">
        {{ p_form.gender }}
    </div>
</div>

<!-- NGÀY SINH -->
<div class="mb-3">
    <label class="profile-label">Ngày sinh</label>
    {{ p_form.birthday }}
</div>
                    <button class="btn-neon-save mt-3">
                        Lưu thay đổi
                    </button>

                </div>

                <!-- RIGHT -->
                <div class="col-md-5 d-flex flex-column align-items-center">

                    <img id="avatarPreview"
                         src="{% if user.profile.avatar %}{{ user.profile.avatar.url }}{% else %}/media/avatars/default.png{% endif %}"
                         class="profile-avatar mb-3">

                    <label class="btn btn-outline-info">
                        Chọn Ảnh
                        <input type="file"
                               name="avatar"
                               id="avatarInput"
                               hidden>
                    </label>

                    <small class="text-muted mt-2 text-center">
                        Dung lượng tối đa 1MB <br>
                        Định dạng: JPG, PNG
                    </small>

                </div>

            </div>

        </form>

    </div>
</div>

{% endblock %}
